    <style>
        body { 
            background-color: #000000; 
            color: #fff; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            line-height: 1.6; 
            position: relative;
        }

        /* FONDO DE CIRCUITOS DINÁMICOS ASÍNCRONOS (Estilo La Premium) */
        .circuito-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .circuito-bg pattern g {
            stroke: #d4af37;
            stroke-width: 1.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
        /* Líneas base estáticas atenuadas */
        .base-path { stroke-opacity: 0.12; }
        
        /* Impulsos de luz viajando (Fotones) */
        .foton {
            stroke-opacity: 0.85;
            stroke: #fff;
            stroke-dasharray: 20 150;
            animation: viajarFoton linear infinite;
        }
        /* Variaciones de velocidad y retrasos al azar para romper la simetría */
        .f1 { animation-duration: 4s; animation-delay: 0s; }
        .f2 { animation-duration: 5s; animation-delay: 1.5s; animation-direction: reverse; }
        .f3 { animation-duration: 3.5s; animation-delay: 0.7s; }
        .f4 { animation-duration: 6s; animation-delay: 2.2s; }

        /* Nodos terminales con efecto pulso/brillo */
        .nodo {
            fill: #d4af37;
            fill-opacity: 0.25;
            transform-origin: center;
            animation: brillarNodo 2s ease-in-out infinite alternate;
        }
        .n1 { animation-delay: 0.3s; animation-duration: 1.8s; }
        .n2 { animation-delay: 1.2s; animation-duration: 2.5s; }
        .n3 { animation-delay: 0.7s; animation-duration: 1.5s; }

        @keyframes viajarFoton {
            0% { stroke-dashoffset: 200; filter: drop-shadow(0 0 2px #d4af37); }
            100% { stroke-dashoffset: -200; filter: drop-shadow(0 0 6px #fff); }
        }
        @keyframes brillarNodo {
            0% { fill-opacity: 0.2; r: 2.5; fill: #d4af37; }
            50% { fill-opacity: 1; r: 4; fill: #fff; filter: drop-shadow(0 0 5px #d4af37); }
            100% { fill-opacity: 0.4; r: 2.5; fill: #d4af37; }
        }
        /* FIN SISTEMA DE FONDO */

        section { padding: 60px 5%; text-align: center; background-color: transparent; }
        .flex-container { display: flex; align-items: center; justify-content: space-between; gap: 40px; max-width: 1100px; margin: 40px auto; text-align: left; }
        .text-side { flex: 1; }
        .image-side { flex: 1; display: flex; justify-content: center; }
