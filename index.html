<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trulink Fiber LLC | Ingeniería en Infraestructura Digital</title>
    <style>
        /* Reseteo para evitar desalineación */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000; color: #fff; font-family: sans-serif; line-height: 1.6; }
        
        /* Contenedor principal */
        .container { max-width: 900px; margin: auto; padding: 20px; }
        
        /* Títulos centrados */
        h1, h2 { color: #C5A059; text-align: center; margin: 30px 0; }
        .subtitle { text-align: center; margin-bottom: 20px; }
        
        /* Imagen grande de fábrica */
        .main-img { width: 100%; border-radius: 8px; border: 2px solid #C5A059; display: block; margin: 20px auto; }
        
        /* Galería corregida */
        .gallery { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 30px; }
        .gallery-item { text-align: center; width: 150px; }
        .gallery-item img { width: 150px; height: 150px; object-fit: cover; border-radius: 8px; border: 2px solid #C5A059; display: block; }
        .gallery-item p { color: #C5A059; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Trulink: Ingeniería en Infraestructura Digital</h1>
    <p class="subtitle">Manufactura industrial de alta precisión desde el Hub logístico de las Américas.</p>

    <h2>Manufactura de Clase Mundial</h2>
    <img src="images/fabrica.jpg" alt="Trulink Fábrica" class="main-img">

    <div class="gallery">
        <div class="gallery-item"><img src="images/accesorios.jpg" alt="Accesorios"><p>Accesorios</p></div>
        <div class="gallery-item"><img src="images/herraje.jpg" alt="Herraje"><p>Herraje</p></div>
        <div class="gallery-item"><img src="images/drop.jpg" alt="Drop"><p>Drop</p></div>
        <div class="gallery-item"><img src="images/adss.jpg" alt="ADSS"><p>ADSS</p></div>
        <div class="gallery-item"><img src="images/asu.jpg" alt="ASU"><p>ASU</p></div>
    </div>
</div>

</body>
</html>
