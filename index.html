<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="title-tag">Trulink Fiber LLC | Ingeniería de Precisión</title>
    <style>
        body { 
            background-color: #000000; 
            color: #fff; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            line-height: 1.6; 
            position: relative;
        }

        /* FONDO DE CIRCUITOS PREMIUM: FOTÓN DE CABEZA CON ESTELA Y DISPARO SINCRO */
        .circuito-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .circuito-bg pattern g {
            stroke: #d4af37;
            stroke-width: 1.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
        /* Líneas base estáticas sutiles */
        .base-path { stroke-opacity: 0.12; }
        
        /* LA ESTELA (El rayo/cola dorada) */
        .rayo-linea {
            stroke: #d4af37;
            stroke-width: 1.5;
            stroke-opacity: 0;
            stroke-dasharray: 60 300; 
            filter: drop-shadow(0 0 3px #d4af37);
            animation: viajeEstela 6s linear infinite;
        }

        /* EL FOTÓN DE FRENTE (El destello brillante que lidera el recorrido) */
        .foton-cabeza {
            fill: #ffffff; /* Blanco al centro para máxima intensidad lumínica */
            filter: drop-shadow(0 0 5px #d4af37) drop-shadow(0 0 2px #ffffff);
            opacity: 0;
            /* Vinculamos el movimiento del círculo a la misma geometría del path */
            offset-path: path("M0 28 h36 l40 40 v50");
            animation: viajeCabeza 6s linear infinite;
        }

        /* EL NODO TERMINAL (Reacciona exactamente al impacto en el segundo 3s) */
        .nodo-sincro {
            fill: #d4af37;
            fill-opacity: 0.05;
            transform-origin: center;
            animation: impactoNodo 6s ease-in-out infinite;
        }

        /* ANIMACIÓN DE LA ESTELA (Cola) */
        @keyframes viajeEstela {
            0% { stroke-dashoffset: 350; stroke-opacity: 0; }
            5% { stroke-opacity: 0.8; }
            48% { stroke-opacity: 0.8; }
            50%, 100% { stroke-dashoffset: 0; stroke-opacity: 0; }
        }

        /* ANIMACIÓN DEL FOTÓN DE CABEZA (Avanza del 0% al 100% del path en 3 segundos) */
        @keyframes viajeCabeza {
            0% { offset-distance: 0%; opacity: 0; scale: 0.5; }
            5% { opacity: 1; scale: 1.2; }
            48% { opacity: 1; scale: 1.2; }
            50% { offset-distance: 100%; opacity: 0; scale: 0.5; } /* Impacta exactamente a los 3s */
            100% { offset-distance: 100%; opacity: 0; }
        }
        
        /* ANIMACIÓN DEL NODO: Detonación sutil en el punto de contacto */
        @keyframes impactoNodo {
            0%, 48% { fill-opacity: 0.05; r: 2.2; filter: none; }
            50% { fill-opacity: 1; r: 3.8; filter: drop-shadow(0 0 6px #d4af37) drop-shadow(0 0 2px #fff); } /* ¡Impacto sincronizado! */
            65% { fill-opacity: 0.4; r: 2.5; filter: drop-shadow(0 0 2px #d4af37); }
            80%, 100% { fill-opacity: 0.05; r: 2.2; filter: none; }
        }
        /* FIN SISTEMA DE FONDO AVANZADO */

        .full-width-banner { width: 100%; display: block; line-height: 0; }
        .full-width-banner img { width: 100%; height: auto; display: block; }
        .golden { color: #d4af37; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); }
        .logo { height: 80px; width: auto; }
        .header-address { font-size: 0.9rem; color: #ccc; text-align: center; max-width: 400px; }
        #lang-selector { background: #111; color: #d4af37; border: 1px solid #d4af37; padding: 5px; cursor: pointer; }
        section { padding: 60px 5%; text-align: center; background-color: transparent; }
        .flex-container { display: flex; align-items: center; justify-content: space-between; gap: 40px; max-width: 1100px; margin: 40px auto; text-align: left; }
        .text-side { flex: 1; }
        .image-side { flex: 1; display: flex; justify-content: center; }
        .image-side img { width: 100%; max-width: 500px; height: 350px; object-fit: cover; border: 1px solid #d4af37; border-radius: 8px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; padding: 20px 0; max-width: 1000px; margin: 0 auto; }
        .solucion-item { text-align: center; }
        .solucion-item h3 { color: #d4af37; margin-bottom: 10px; font-size: 1.1rem; }
        
        .img-wrapper { position: relative; width: 100%; overflow: visible; cursor: pointer; perspective: 1000px; border-radius: 8px; }
        .solucion-item img { width: 100%; display: block; border: 1px solid #333; border-radius: 8px; background: #fff; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        
        .rayo-svg { position: absolute; top: -2px; left: -2px; width: calc(100% + 4px); height: calc(100% + 4px); pointer-events: none; z-index: 10; }
        .rayo-svg rect { width: 100%; height: 100%; rx: 8px; ry: 8px; fill: none; stroke: #d4af37; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 800; stroke-dashoffset: 800; opacity: 0; }
        
        .destello { position: absolute; left: -2px; bottom: -2px; width: 20px; height: 20px; background: radial-gradient(circle, #fff 10%, #d4af37 60%, transparent 100%); border-radius: 50%; box-shadow: 0 0 20px 5px #d4af37; opacity: 0; pointer-events: none; z-index: 11; transform: translate(-35%, 35%) scale(0); }

        .img-wrapper.animating img { animation: girar3D 0.9s ease-in-out forwards; }
        .img-wrapper.animating .rayo-svg rect { animation: correrRayo 1.4s linear 0.9s forwards; }
        .img-wrapper.animating .destello { animation: estallidoLuz 0.5s ease-out 2.3s forwards; }

        @keyframes girar3D {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        @keyframes correrRayo {
            0% { opacity: 1; stroke-dashoffset: 800; }
            100% { opacity: 1; stroke-dashoffset: 0; }
        }
        @keyframes estallidoLuz {
            0% { opacity: 0; transform: translate(-35%, 35%) scale(0); }
            50% { opacity: 1; transform: translate(-35%, 35%) scale(3); filter: brightness(1.5); }
            100% { opacity: 0; transform: translate(-35%, 35%) scale(1); }
        }

        .btn-download { display: inline-block; padding: 15px 25px; background-color: transparent; border: 2px solid #d4af37; color: #d4af37; text-decoration: none; border-radius: 5px; transition: 0.3s; font-weight: bold; margin: 10px; }
        .btn-download:hover { background-color: #d4af37; color: #000; }
        .region-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; max-width: 1000px; margin: 30px auto; }
        .region-card { background: rgba(17, 17, 17, 0.75); backdrop-filter: blur(5px); padding: 25px; border: 1px solid #d4af37; border-radius: 8px; }
        form { display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; gap: 15px; }
        input, textarea { padding: 12px; background: rgba(17, 17, 17, 0.8); border: 1px solid #d4af37; color: white; border-radius: 4px; }
        button { padding: 12px; background: #d4af37; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; color: #000; transition: 0.3s; }
        button:hover { background: #b8962d; }
        footer { padding: 40px; border-top: 1px solid #d4af37; text-align: center; background-color: rgba(0, 0, 0, 0.9); }
        .social-icons { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
        .social-icons a img { width: 50px; height: 50px; object-fit: contain; }
        @media (max-width: 768px) {
            .flex-container { flex-direction: column; text-align: center; }
            .image-side img { height: auto; }
        }
    </style>
</head>

            <g>
