<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="title-tag">Trulink Fiber LLC | Ingeniería de Precisión</title>
    <style>
        body { background-color: #000000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; line-height: 1.6; position: relative; }

        /* FONDO DE CIRCUITOS: Reducido en 60% su densidad de líneas */
        .circuito-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .circuito-bg pattern g { stroke: #d4af37; stroke-width: 0.8; stroke-linecap: round; fill: none; stroke-opacity: 0.08; }

        .full-width-banner { width: 100%; display: block; line-height: 0; }
        .full-width-banner img { width: 100%; height: auto; display: block; }
        .golden { color: #d4af37; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); }
        .logo { height: 80px; width: auto; }
        .header-address { font-size: 0.9rem; color: #ccc; text-align: center; max-width: 400px; }
        #lang-selector { background: #111; color: #d4af37; border: 1px solid #d4af37; padding: 5px; cursor: pointer; }
        section { padding: 60px 5%; text-align: center; }
        .flex-container { display: flex; align-items: center; justify-content: space-between; gap: 40px; max-width: 1100px; margin: 40px auto; text-align: left; }
        .text-side { flex: 1; }
        .image-side { flex: 1; display: flex; justify-content: center; }
        .image-side img { width: 100%; max-width: 500px; height: 350px; object-fit: cover; border: 1px solid #d4af37; border-radius: 8px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; padding: 20px 0; max-width: 1000px; margin: 0 auto; }
        .solucion-item { text-align: center; }
        .solucion-item h3 { color: #d4af37; margin-bottom: 10px; font-size: 1.1rem; }
        
        /* RAYOS DE BORDES EN IMÁGENES (MANTENIDOS ORIGINALES) */
        .img-wrapper { position: relative; width: 100%; overflow: visible; cursor: pointer; border-radius: 8px; }
        .solucion-item img { width: 100%; display: block; border: 1px solid #333; border-radius: 8px; background: #fff; }
        .rayo-svg { position: absolute; top: -2px; left: -2px; width: calc(100% + 4px); height: calc(100% + 4px); pointer-events: none; }
        .rayo-svg rect { width: 100%; height: 100%; rx: 8px; ry: 8px; fill: none; stroke: #d4af37; stroke-width: 3; }

        .btn-download { display: inline-block; padding: 10px 20px; background-color: transparent; border: 1px solid #d4af37; color: #d4af37; text-decoration: none; border-radius: 4px; transition: 0.3s; font-size: 0.9rem; margin: 5px; }
        .btn-download:hover { background-color: #d4af37; color: #000; }
        
        .region-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; max-width: 1000px; margin: 30px auto; }
        .region-card { background: rgba(17, 17, 17, 0.75); padding: 25px; border: 1px solid #d4af37; border-radius: 8px; }
        form { display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; gap: 15px; }
        input, textarea { padding: 12px; background: rgba(17, 17, 17, 0.8); border: 1px solid #d4af37; color: white; border-radius: 4px; }
        button { padding: 12px; background: #d4af37; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; color: #000; }
        footer { padding: 40px; border-top: 1px solid #d4af37; text-align: center; }
    </style>
</head>
<body>

<!-- FONDO CON 60% MENOS CIRCUITOS -->
<svg class="circuito-bg">
    <defs>
        <pattern id="circuit-pattern" width="300" height="300" patternUnits="userSpaceOnUse">
            <!-- Reducción drástica de la red de circuitos -->
            <path d="M0 50 h100 M150 0 v100 M200 200 h100" />
        </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#circuit-pattern)" />
</svg>

<header>
    <img src="1766012249626-removebg-preview.png" class="logo" alt="Trulink Logo">
    <div class="header-address"><strong>TRULINK FIBER LLC</strong><br>5203 Juan Tabo Blvd Ne, Albuquerque, NM, 87111-2691, US</div>
    <select id="lang-selector" onchange="changeLanguage()"><option value="es">Español</option><option value="en">English</option></select>
</header>

<!-- Resto del contenido original intacto... -->
<section>
    <h2 id="txt13" class="golden">Nuestras Soluciones</h2>
    <div class="grid">
        <div class="solucion-item"><h3 id="txt14">ASU</h3><div class="img-wrapper"><img src="images/asu.jpg"><svg class="rayo-svg"><rect/></svg></div></div>
        <div class="solucion-item"><h3 id="txt15">ADSS</h3><div class="img-wrapper"><img src="images/adss.jpg"><svg class="rayo-svg"><rect/></svg></div></div>
        <div class="solucion-item"><h3 id="txt16">DROP</h3><div class="img-wrapper"><img src="images/drop.jpg"><svg class="rayo-svg"><rect/></svg></div></div>
        <div class="solucion-item"><h3 id="txt17">HERRAJES</h3><div class="img-wrapper"><img src="images/herraje.jpg"><svg class="rayo-svg"><rect/></svg></div></div>
        <div class="solucion-item"><h3 id="txt18">ACCESORIOS</h3><div class="img-wrapper"><img src="images/accesorios.jpg"><svg class="rayo-svg"><rect/></svg></div></div>
    </div>
</section>

<!-- (Se mantiene la estructura del resto de secciones igual) -->
</body>
</html>
